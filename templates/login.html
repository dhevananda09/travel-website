<!DOCTYPE html>
<html>
<head>
<title>Admin Login | VivaTrips</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:linear-gradient(120deg,#eef2ff,#f9f9ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* GLASS BOX */
.box{
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    width:320px;
    text-align:center;
    color:#333;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    animation:fadeIn 0.5s ease;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    margin-bottom:20px;
}

/* INPUT */
.input-box{
    position:relative;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
    transition:0.2s;
}

input:focus{
    border-color:#667eea;
    box-shadow:0 0 5px rgba(102,126,234,0.3);
}

/* PASSWORD TOGGLE */
.toggle{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:12px;
    color:#555;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}
button:hover{
    transform:scale(1.03);
}

/* FLASH */
.flash{
    margin-bottom:10px;
    padding:10px;
    border-radius:8px;
    font-size:14px;
}
.danger{background:#ff4d4d; color:white;}
.success{background:#28a745; color:white;}
.warning{background:#ffc107; color:black;}

small{
    display:block;
    margin-top:12px;
    opacity:0.7;
}
</style>

</head>

<body>

<div class="box">

<h2>🔐 Admin Login</h2>

<!-- FLASH -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
    {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
    {% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<input name="username" placeholder="Username" required>

<div class="input-box">
<input type="password" name="password" id="password" placeholder="Password" required>
<span class="toggle" onclick="togglePassword()" id="toggleText">Show</span>
</div>

<button type="submit">Login</button>

</form>

<small>Use: admin / 1234</small>

</div>

<script>
// TOGGLE PASSWORD + TEXT CHANGE
function togglePassword(){
    let pass = document.getElementById("password");
    let text = document.getElementById("toggleText");

    if(pass.type === "password"){
        pass.type = "text";
        text.innerText = "Hide";
    } else {
        pass.type = "password";
        text.innerText = "Show";
    }
}
</script>

</body>
</html>
