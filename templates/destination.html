<!DOCTYPE html>
<html>
<head>
<title>{{ place }}</title>

<style>
body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    text-align:center;
}

.container{
    margin-top:30px;
}

img{
    width:60%;
    border-radius:20px;
    margin:20px 0;
}

.desc{
    font-size:18px;
    width:60%;
    margin:auto;
}

.btn{
    margin-top:20px;
    padding:10px 20px;
    background:white;
    color:#667eea;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>{{ place }}</h1>

<img src="{{ url_for('static', filename='images/' + data.img) }}">

<p class="desc">{{ data.desc }}</p>

<button class="btn" onclick="goBack()">⬅ Back</button>

</div>

<script>
function goBack(){
    window.location="/";
}
</script>

</body>
</html>
